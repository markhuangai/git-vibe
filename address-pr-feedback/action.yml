name: GitVibe address PR feedback
description: Address unresolved review feedback on an existing pull request.

inputs:
  token:
    description: GitHub token used for API access.
    required: true
  pr-number:
    description: Pull request number to update.
    required: true
  stage-timeout-minutes:
    description: Maximum minutes allocated to this stage.
    required: false
    default: "120"
  max-turns:
    description: Maximum AI turns allocated to this stage.
    required: false
    default: "120"
  dry-run:
    description: Describe work without mutating GitHub.
    required: false
    default: "false"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
  handoff-dir:
    description: Directory containing previous GitVibe stage result JSON files.
    required: false
    default: ""
  fail-on-blocked:
    description: Return a non-zero action status when the stage result is not completed.
    required: false
    default: "false"
  validation-repair-attempts:
    description: Maximum validation repair attempts before feedback remediation fails.
    required: false
    default: "2"
  validation-repair-max-turns:
    description: Maximum AI turns for each validation repair attempt.
    required: false
    default: "90"
  accept-risk:
    description: Allow this run to continue after a trusted prompt-injection risk acceptance.
    required: false
    default: "false"
  accept-risk-actor:
    description: GitHub login that accepted the prompt-injection risk.
    required: false
    default: ""
  accept-risk-artifact-sha:
    description: Pull request head SHA covered by the accepted-risk decision.
    required: false
    default: ""
  accept-risk-stage:
    description: Comma-separated GitVibe stages covered by the accepted-risk decision.
    required: false
    default: ""

outputs:
  summary:
    description: Short stage summary.
    value: ${{ steps.run.outputs.summary }}
  status:
    description: Stage result status.
    value: ${{ steps.run.outputs.status }}
  next-state:
    description: Stage next state.
    value: ${{ steps.run.outputs.next-state }}
  comment-body:
    description: Rendered stage result comment body.
    value: ${{ steps.run.outputs.comment-body }}
  result-file:
    description: Path to the persisted stage result JSON file.
    value: ${{ steps.run.outputs.result-file }}

runs:
  using: composite
  steps:
    - name: Build GitVibe action runtime
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        if command -v corepack >/dev/null 2>&1 && corepack enable; then
          pnpm_cmd=(corepack pnpm)
        elif command -v pnpm >/dev/null 2>&1; then
          pnpm_cmd=(pnpm)
        else
          echo "::error::GitVibe requires pnpm or Corepack on the runner."
          exit 127
        fi
        echo "Using ${pnpm_cmd[*]} for GitVibe action runtime build"
        "${pnpm_cmd[@]}" install --frozen-lockfile
        "${pnpm_cmd[@]}" build
    - name: Set up configured AI CLI
      shell: bash
      run: node "$GITHUB_ACTION_PATH/../dist/actions/setup-ai-cli.js" address-pr-feedback
    - id: run
      shell: bash
      env:
        GITVIBE_GITHUB_TOKEN: ${{ inputs.token }}
        GITVIBE_PR_NUMBER: ${{ inputs.pr-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_MAX_TURNS: ${{ inputs.max-turns }}
        GITVIBE_DRY_RUN: ${{ inputs.dry-run }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
        GITVIBE_HANDOFF_DIR: ${{ inputs.handoff-dir }}
        GITVIBE_FAIL_ON_BLOCKED: ${{ inputs.fail-on-blocked }}
        GITVIBE_VALIDATION_REPAIR_ATTEMPTS: ${{ inputs.validation-repair-attempts }}
        GITVIBE_VALIDATION_REPAIR_MAX_TURNS: ${{ inputs.validation-repair-max-turns }}
        GITVIBE_ACCEPT_RISK: ${{ inputs.accept-risk }}
        GITVIBE_ACCEPT_RISK_ACTOR: ${{ inputs.accept-risk-actor }}
        GITVIBE_ACCEPT_RISK_ARTIFACT_SHA: ${{ inputs.accept-risk-artifact-sha }}
        GITVIBE_ACCEPT_RISK_STAGE: ${{ inputs.accept-risk-stage }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/run-action.js" address-pr-feedback
