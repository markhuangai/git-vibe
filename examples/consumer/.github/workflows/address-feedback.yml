name: GitVibe address feedback
run-name: "[git-vibe][address-feedback]: PR #${{ inputs.pr-number }}"

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number with feedback to address.
        required: true
        type: string
      timeout_minutes:
        description: Maximum minutes for the feedback remediation job.
        required: false
        type: number
        default: 120
      max_turns:
        description: Maximum AI turns for feedback remediation.
        required: false
        type: number
        default: 120
      dry-run:
        description: Validate without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
jobs:
  address-feedback:
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    uses: markhuangai/git-vibe/.github/workflows/address-feedback.yml@v4.0.0
    with:
      pr-number: ${{ github.event.inputs.pr-number }}
      runner: ubuntu-latest
      timeout_minutes: ${{ fromJSON(github.event.inputs.timeout_minutes) }}
      max_turns: ${{ fromJSON(github.event.inputs.max_turns) }}
      dry-run: ${{ fromJSON(github.event.inputs.dry-run) }}
      source-comment: ${{ github.event.inputs.source-comment }}
    secrets:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
