name: GitVibe investigate

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      dry-run:
        description: Validate without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""

jobs:
  investigate:
    uses: git-vibe/actions/.github/workflows/investigate.yml@main
    with:
      issue-number: ${{ inputs.issue-number }}
      runner: ubuntu-latest
      timeout_minutes: 60
      max_turns: 90
      dry-run: ${{ inputs.dry-run }}
      source-comment: ${{ inputs.source-comment }}
    secrets:
      GITVIBE_GITHUB_TOKEN: ${{ secrets.GITVIBE_GITHUB_TOKEN }}
      GITVIBE_AI_API_KEY: ${{ secrets.GITVIBE_AI_API_KEY }}
