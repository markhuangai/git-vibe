name: GitVibe materialize

on:
  workflow_dispatch:
    inputs:
      discussion-number:
        description: Discussion number to materialize.
        required: true
        type: string
      dry-run:
        description: Validate without writing to GitHub.
        required: false
        type: boolean
        default: false

jobs:
  materialize:
    uses: git-vibe/actions/.github/workflows/materialize.yml@main
    with:
      discussion-number: ${{ inputs.discussion-number }}
      runner: ubuntu-latest
      timeout_minutes: 60
      max_turns: 90
      dry-run: ${{ inputs.dry-run }}
    secrets:
      GITVIBE_GITHUB_TOKEN: ${{ secrets.GITVIBE_GITHUB_TOKEN }}
      GITVIBE_AI_API_KEY: ${{ secrets.GITVIBE_AI_API_KEY }}
