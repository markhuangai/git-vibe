name: GitVibe validate

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to validate.
        required: false
        type: string
        default: ""
      discussion-number:
        description: Discussion number to validate.
        required: false
        type: string
        default: ""
      dry-run:
        description: Validate without writing to GitHub.
        required: false
        type: boolean
        default: false

jobs:
  validate:
    uses: git-vibe/actions/.github/workflows/validate.yml@main
    with:
      issue-number: ${{ inputs.issue-number }}
      discussion-number: ${{ inputs.discussion-number }}
      runner: ubuntu-latest
      timeout_minutes: 60
      max_turns: 90
      dry-run: ${{ inputs.dry-run }}
    secrets:
      GITVIBE_GITHUB_TOKEN: ${{ secrets.GITVIBE_GITHUB_TOKEN }}
      GITVIBE_AI_API_KEY: ${{ secrets.GITVIBE_AI_API_KEY }}
