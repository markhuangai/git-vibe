name: GitVibe validate
run-name: "[git-vibe][validate]: ${{ inputs.discussion-number != '' && format('Discussion #{0}', inputs.discussion-number) || inputs.issue-number != '' && format('Issue #{0}', inputs.issue-number) || 'Artifact' }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to validate.
        required: false
        type: string
        default: ""
      discussion-number:
        description: Discussion number to validate.
        required: false
        type: string
        default: ""
      timeout_minutes:
        description: Maximum minutes for this job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
jobs:
  validate:
    permissions:
      id-token: write
      contents: read
      discussions: write
      issues: write
    uses: markhuangai/git-vibe/.github/workflows/validate.yml@v4.0.0
    with:
      issue-number: ${{ github.event.inputs.issue-number }}
      discussion-number: ${{ github.event.inputs.discussion-number }}
      runner: ubuntu-latest
      timeout_minutes: ${{ fromJSON(github.event.inputs.timeout_minutes) }}
      max_turns: ${{ fromJSON(github.event.inputs.max_turns) }}
      dry-run: ${{ fromJSON(github.event.inputs.dry-run) }}
      source-comment: ${{ github.event.inputs.source-comment }}
    secrets:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
