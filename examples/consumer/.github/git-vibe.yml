# Copy this file to .github/git-vibe.yml in the consumer repository.

version: 1

event_delivery:
  # Hosted GitHub App installs configure webhooks centrally; repositories do not create hooks.
  mode: webhook
  relay:
    provider: smee
    # GitHub Actions Secret name. Relay URLs may contain delivery tokens; do not commit the real URL.
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  mode: github-app

tests:
  commands: []

ai:
  security:
    web:
      # Default for public repositories: let AI search current GitHub project material only.
      # Add domains only for websites the repository owner trusts AI to search and fetch.
      allowed_domains: []
      # - github.com
      # - "*.github.com"
  profiles:
    codex_sdk:
      adapter: codex-sdk
      # Key inside GITVIBE_AI_ENV_JSON. Stores escaped auth.json text from jq -Rs .
      # Requires the GitVibe GitHub App repository Secrets write permission for refresh write-back.
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.3-codex
      reasoning:
        effort: high
        summary: concise
    claude_code:
      adapter: claude-code-sdk
      env:
        ANTHROPIC_API_KEY:
          from_bundle: GITVIBE_AI_API_KEY
        ANTHROPIC_BASE_URL:
          from_bundle: ANTHROPIC_BASE_URL
        ANTHROPIC_DEFAULT_OPUS_MODEL: kimi-k2.5
        ANTHROPIC_DEFAULT_SONNET_MODEL: kimi-k2.5
        ANTHROPIC_DEFAULT_HAIKU_MODEL: kimi-k2.5
        ANTHROPIC_MODEL: opus
        CLAUDE_CODE_SUBAGENT_MODEL: opus
      model: opus
      reasoning:
        effort: xhigh
  # Optional MCP servers. Stage entries choose which server tools are available.
  # Credentials referenced with from_bundle are read from GITVIBE_MCP_ENV_JSON.
  # mcp:
  #   servers:
  #     dense_mem:
  #       transport: stdio
  #       command: node
  #       args: ["./scripts/dense-mem-mcp.js"]
  #       env:
  #         DENSE_MEM_API_KEY:
  #           from_bundle: DENSE_MEM_API_KEY
  role_groups:
    review_gate:
      synthesizer: codex_sdk
      parallel: 2
      roles:
        - role: correctness.md
          profile: claude_code
        - role: security.md
          profile: claude_code
        - role: maintainability.md
          profile: claude_code
  budgets:
    default_timeout_minutes: 60
    review_timeout_minutes: 60
    implementation_timeout_minutes: 120
    feedback_timeout_minutes: 120
    create_pr_timeout_minutes: 15
    default_max_turns: 90
    implementation_max_turns: 200
    feedback_max_turns: 120
    validation_repair_attempts: 3
    validation_repair_max_turns: 45
    pr_feedback_max_iterations: 3
    request_retry_attempts: 3
    request_retry_delay_seconds: 60
  stages:
    investigate:
      role_group: review_gate
    validate:
      role_group: review_gate
    materialize:
      profile: codex_sdk
    implement:
      profile: codex_sdk
    review-matrix:
      role_group: review_gate
      # Optional stage-scoped MCP model-callable tools.
      # mcp:
      #   dense_mem:
      #     required: false
      #     tools: ["search_memory"]
    create-pr:
      profile: codex_sdk
    address-pr-feedback:
      profile: codex_sdk
