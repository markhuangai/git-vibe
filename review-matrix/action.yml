name: GitVibe review matrix
description: Run GitVibe's configured review matrix for an issue or pull request.

inputs:
  issue-number:
    description: Issue number being reviewed.
    required: false
    default: ""
  pr-number:
    description: Pull request number being reviewed.
    required: false
    default: ""
  stage-timeout-minutes:
    description: Maximum minutes allocated to this stage.
    required: false
    default: "60"
  max-turns:
    description: Maximum AI turns allocated to this stage.
    required: false
    default: "90"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
  fail-on-blocked:
    description: Return a non-zero action status when the stage result is not completed.
    required: false
    default: "false"
  execution-mode:
    description: "Internal execution mode: standard, member, or finalizer."
    required: false
    default: "standard"
  member-index:
    description: Matrix member index used to resolve the configured role/profile pair.
    required: false
    default: ""
outputs:
  summary:
    description: Short stage summary.
    value: ${{ steps.run.outputs.summary }}
  status:
    description: Stage result status.
    value: ${{ steps.run.outputs.status }}
  next-state:
    description: Stage next state.
    value: ${{ steps.run.outputs.next-state }}
  comment-body:
    description: Rendered stage result comment body.
    value: ${{ steps.run.outputs.comment-body }}
  result-file:
    description: Path to the persisted stage result JSON file.
    value: ${{ steps.run.outputs.result-file }}

runs:
  using: composite
  steps:
    - name: Verify GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        for file in dist/actions/run-action.js dist/actions/run-action.mjs; do
          if [ ! -f "$file" ]; then
            echo "::error::Missing prebuilt GitVibe action runtime: $file. Run corepack pnpm build and commit dist/actions."
            exit 1
          fi
        done
    - id: run
      shell: bash
      env:
        GITVIBE_ISSUE_NUMBER: ${{ inputs.issue-number }}
        GITVIBE_PR_NUMBER: ${{ inputs.pr-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_MAX_TURNS: ${{ inputs.max-turns }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
        GITVIBE_FAIL_ON_BLOCKED: ${{ inputs.fail-on-blocked }}
        GITVIBE_EXECUTION_MODE: ${{ inputs.execution-mode }}
        GITVIBE_MEMBER_INDEX: ${{ inputs.member-index }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/run-action.js" review-matrix
