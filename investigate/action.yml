name: GitVibe investigate
description: Inspect an issue or pull request and produce maintainer handoff context.

inputs:
  issue-number:
    description: Issue number to investigate. Required unless pr-number is set.
    required: false
  pr-number:
    description: Pull request number to investigate. Required unless issue-number is set.
    required: false
  stage-timeout-minutes:
    description: Maximum minutes allocated to this stage.
    required: false
    default: "60"
  max-turns:
    description: Maximum AI turns allocated to this stage.
    required: false
    default: "90"
  dry-run:
    description: Describe work without mutating GitHub.
    required: false
    default: "false"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
  fail-on-blocked:
    description: Return a non-zero action status when the stage result is not completed.
    required: false
    default: "false"
  fail-on-not-ready:
    description: Return a non-zero action status when investigation is not ready for implementation.
    required: false
    default: "false"
  execution-mode:
    description: "Internal execution mode: standard, member, or finalizer."
    required: false
    default: "standard"
  profile:
    description: Explicit AI profile for member or finalizer execution.
    required: false
    default: ""
  role:
    description: Role markdown filename for matrix member execution.
    required: false
    default: ""
  member-index:
    description: Matrix member index used to resolve the configured role/profile pair.
    required: false
    default: ""
outputs:
  summary:
    description: Short stage summary.
    value: ${{ steps.run.outputs.summary }}
  status:
    description: Stage result status.
    value: ${{ steps.run.outputs.status }}
  comment-body:
    description: Rendered stage result comment body.
    value: ${{ steps.run.outputs.comment-body }}
  next-state:
    description: Investigation next state.
    value: ${{ steps.run.outputs.next-state }}
  ready-for-implementation:
    description: Whether the investigation can safely proceed to implementation.
    value: ${{ steps.run.outputs.ready-for-implementation }}
  result-file:
    description: Path to the persisted stage result JSON file.
    value: ${{ steps.run.outputs.result-file }}

runs:
  using: composite
  steps:
    - name: Build GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        if command -v corepack >/dev/null 2>&1 && corepack enable; then
          pnpm_cmd=(corepack pnpm)
        elif command -v pnpm >/dev/null 2>&1; then
          pnpm_cmd=(pnpm)
        else
          echo "::error::GitVibe requires pnpm or Corepack on the runner."
          exit 127
        fi
        echo "Using ${pnpm_cmd[*]} for GitVibe action runtime build"
        "${pnpm_cmd[@]}" install --frozen-lockfile
        "${pnpm_cmd[@]}" build
    - name: Prepare Claude Code executable
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: bash "$GITHUB_ACTION_PATH/../scripts/prepare-claude-code.sh"
    - id: run
      shell: bash
      env:
        GITVIBE_ISSUE_NUMBER: ${{ inputs.issue-number }}
        GITVIBE_PR_NUMBER: ${{ inputs.pr-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_MAX_TURNS: ${{ inputs.max-turns }}
        GITVIBE_DRY_RUN: ${{ inputs.dry-run }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
        GITVIBE_FAIL_ON_BLOCKED: ${{ inputs.fail-on-blocked }}
        GITVIBE_FAIL_ON_NOT_READY: ${{ inputs.fail-on-not-ready }}
        GITVIBE_EXECUTION_MODE: ${{ inputs.execution-mode }}
        GITVIBE_PROFILE_NAME: ${{ inputs.profile }}
        GITVIBE_ROLE_NAME: ${{ inputs.role }}
        GITVIBE_MEMBER_INDEX: ${{ inputs.member-index }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/run-action.js" investigate
