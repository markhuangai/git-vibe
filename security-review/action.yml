name: GitVibe security review
description: Deterministically review untrusted context before any GitVibe LLM call.

inputs:
  stage:
    description: GitVibe stage whose context should be reviewed.
    required: true
  issue-number:
    description: Issue number to review.
    required: false
    default: ""
  discussion-number:
    description: Discussion number to review.
    required: false
    default: ""
  pr-number:
    description: Pull request number to review.
    required: false
    default: ""
  stage-timeout-minutes:
    description: Maximum minutes allocated to this review.
    required: false
    default: "10"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
  handoff-dir:
    description: Directory containing previous GitVibe stage result JSON files to review.
    required: false
    default: ""
outputs:
  allowed:
    description: Whether downstream LLM jobs may run.
    value: ${{ steps.review.outputs.allowed }}
  summary:
    description: Short review summary.
    value: ${{ steps.review.outputs.summary }}
  status:
    description: Review status.
    value: ${{ steps.review.outputs.status }}
  result-file:
    description: Path to the persisted blocked result JSON file, when blocked.
    value: ${{ steps.review.outputs.result-file }}

runs:
  using: composite
  steps:
    - name: Verify GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        for file in dist/actions/security-review.js dist/actions/security-review.mjs; do
          if [ ! -f "$file" ]; then
            echo "::error::Missing prebuilt GitVibe action runtime: $file. Run corepack pnpm build and commit dist/actions."
            exit 1
          fi
        done
    - id: review
      shell: bash
      env:
        GITVIBE_STAGE: ${{ inputs.stage }}
        GITVIBE_ISSUE_NUMBER: ${{ inputs.issue-number }}
        GITVIBE_DISCUSSION_NUMBER: ${{ inputs.discussion-number }}
        GITVIBE_PR_NUMBER: ${{ inputs.pr-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
        GITVIBE_HANDOFF_DIR: ${{ inputs.handoff-dir }}
        GITVIBE_AI_ENV_JSON: ${{ env.GITVIBE_AI_ENV_JSON }}
        GITVIBE_MCP_ENV_JSON: ${{ env.GITVIBE_MCP_ENV_JSON }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/security-review.js" "${{ inputs.stage }}"
