name: GitVibe mark blocked
description: Mark an issue blocked after an incomplete GitVibe run.

inputs:
  issue-number:
    description: Issue number to mark blocked.
    required: true
runs:
  using: composite
  steps:
    - name: Verify GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        for file in dist/actions/mark-blocked.js dist/actions/mark-blocked.mjs; do
          if [ ! -f "$file" ]; then
            echo "::error::Missing prebuilt GitVibe action runtime: $file. Run corepack pnpm build and commit dist/actions."
            exit 1
          fi
        done
    - name: Mark issue blocked
      shell: bash
      env:
        GITVIBE_ISSUE_NUMBER: ${{ inputs.issue-number }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/mark-blocked.js"
