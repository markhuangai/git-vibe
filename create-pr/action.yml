name: GitVibe create PR
description: Create or update the GitVibe pull request for an implementation issue.

inputs:
  token:
    description: GitHub token used for API access.
    required: true
  issue-number:
    description: Issue number being implemented.
    required: true
  stage-timeout-minutes:
    description: Maximum minutes allocated to this stage.
    required: false
    default: "15"
  max-turns:
    description: Maximum AI turns allocated to this stage.
    required: false
    default: "20"
  dry-run:
    description: Describe work without mutating GitHub.
    required: false
    default: "false"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
  accept-risk:
    description: Allow this run to continue after a trusted prompt-injection risk acceptance.
    required: false
    default: "false"
  accept-risk-actor:
    description: GitHub login that accepted the prompt-injection risk.
    required: false
    default: ""
  accept-risk-artifact-sha:
    description: Pull request head SHA covered by the accepted-risk decision.
    required: false
    default: ""
  accept-risk-cutoff:
    description: Accepted-risk cutoff timestamp for scanning new or edited context.
    required: false
    default: ""
  accept-risk-stage:
    description: Comma-separated GitVibe stages covered by the accepted-risk decision.
    required: false
    default: ""

outputs:
  summary:
    description: Short stage summary.
    value: ${{ steps.run.outputs.summary }}
  pr-number:
    description: Pull request number that was created or updated.
    value: ${{ steps.run.outputs.pr-number }}
  pr-url:
    description: Pull request URL that was created or updated.
    value: ${{ steps.run.outputs.pr-url }}

runs:
  using: composite
  steps:
    - name: Build GitVibe action runtime
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        if command -v corepack >/dev/null 2>&1 && corepack enable; then
          pnpm_cmd=(corepack pnpm)
        elif command -v pnpm >/dev/null 2>&1; then
          pnpm_cmd=(pnpm)
        else
          echo "::error::GitVibe requires pnpm or Corepack on the runner."
          exit 127
        fi
        echo "Using ${pnpm_cmd[*]} for GitVibe action runtime build"
        "${pnpm_cmd[@]}" install --frozen-lockfile
        "${pnpm_cmd[@]}" build
    - name: Set up configured AI CLI
      shell: bash
      run: node "$GITHUB_ACTION_PATH/../dist/actions/setup-ai-cli.js" create-pr
    - id: run
      shell: bash
      env:
        GITVIBE_GITHUB_TOKEN: ${{ inputs.token }}
        GITVIBE_ISSUE_NUMBER: ${{ inputs.issue-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_MAX_TURNS: ${{ inputs.max-turns }}
        GITVIBE_DRY_RUN: ${{ inputs.dry-run }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
        GITVIBE_ACCEPT_RISK: ${{ inputs.accept-risk }}
        GITVIBE_ACCEPT_RISK_ACTOR: ${{ inputs.accept-risk-actor }}
        GITVIBE_ACCEPT_RISK_ARTIFACT_SHA: ${{ inputs.accept-risk-artifact-sha }}
        GITVIBE_ACCEPT_RISK_CUTOFF: ${{ inputs.accept-risk-cutoff }}
        GITVIBE_ACCEPT_RISK_STAGE: ${{ inputs.accept-risk-stage }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/run-action.js" create-pr
