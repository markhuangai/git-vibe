name: GitVibe materialize
description: Create an implementation issue from an accepted feature discussion.

inputs:
  discussion-number:
    description: Discussion number to materialize.
    required: true
  stage-timeout-minutes:
    description: Maximum minutes allocated to this stage.
    required: false
    default: "60"
  max-turns:
    description: Maximum AI turns allocated to this stage.
    required: false
    default: "90"
  dry-run:
    description: Describe work without mutating GitHub.
    required: false
    default: "false"
  source-comment:
    description: JSON source comment metadata for replying to command comments.
    required: false
    default: ""
outputs:
  summary:
    description: Short stage summary.
    value: ${{ steps.run.outputs.summary }}

runs:
  using: composite
  steps:
    - name: Build GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        if command -v corepack >/dev/null 2>&1 && corepack enable; then
          pnpm_cmd=(corepack pnpm)
        elif command -v pnpm >/dev/null 2>&1; then
          pnpm_cmd=(pnpm)
        else
          echo "::error::GitVibe requires pnpm or Corepack on the runner."
          exit 127
        fi
        echo "Using ${pnpm_cmd[*]} for GitVibe action runtime build"
        "${pnpm_cmd[@]}" install --frozen-lockfile
        "${pnpm_cmd[@]}" build
    - id: run
      shell: bash
      env:
        GITVIBE_DISCUSSION_NUMBER: ${{ inputs.discussion-number }}
        GITVIBE_STAGE_TIMEOUT_MINUTES: ${{ inputs.stage-timeout-minutes }}
        GITVIBE_MAX_TURNS: ${{ inputs.max-turns }}
        GITVIBE_DRY_RUN: ${{ inputs.dry-run }}
        GITVIBE_SOURCE_COMMENT: ${{ inputs.source-comment }}
      run: node "$GITHUB_ACTION_PATH/../dist/actions/run-action.js" materialize
