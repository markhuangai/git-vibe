# Copy this file to .github/git-vibe.yml in a consumer repository.

version: 1

permissions:
  # Users with write, maintain, or admin can approve automation.
  approver_roles:
    - write
    - maintain
    - admin

labels:
  story: git-vibe:story
  needs_discussion: git-vibe:needs-discussion
  investigate: git-vibe:investigate
  investigating: git-vibe:investigating
  investigated: git-vibe:investigated
  ready_for_approval: git-vibe:ready-for-approval
  approved: git-vibe:approved
  in_progress: git-vibe:in-progress
  blocked: git-vibe:blocked
  pr_opened: git-vibe:pr-opened
  pr_approved: git-vibe:pr-approved
  pr_merged: git-vibe:pr-merged
  validate: git-vibe:validate

commands:
  prefix: /git-vibe
  allow_external_agent_mentions: false

event_delivery:
  # webhook: repository webhook points at the self-hosted GitVibe server.
  # relay: webhook proxy/tunnel such as Smee, Hookdeck, Cloudflare Tunnel, or ngrok.
  # actions: no-server receiver workflows in the consumer repository.
  # polling: local/scheduled worker polls GitHub APIs with cursors/ETags.
  mode: webhook
  relay:
    provider: smee
    # GitHub Actions Secret name. Relay URLs may contain delivery tokens; do not commit the real URL.
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  # Self-hosted default: the GitVibe server uses a fine-grained PAT scoped to this repository.
  mode: webhook-pat
  # GitHub Actions Secret name. Stores the GitHub write token.
  token_secret: GITVIBE_GITHUB_TOKEN

tests:
  commands: []

ai:
  profiles:
    local_proxy:
      enabled: true
      adapter: ai-sdk-agentool
      # Optional: set to the selected model's context window to log context_used_pct.
      # context_window_tokens: 128000
      provider:
        # openai, anthropic, or openai-compatible.
        type: openai-compatible
        # Model names are configuration, not credentials.
        model: glm-5
        # Keys inside GITVIBE_AI_ENV_JSON. Store provider credentials and endpoints there.
        base_url:
          from_bundle: GITVIBE_AI_BASE_URL
        api_key:
          from_bundle: GITVIBE_AI_API_KEY
      reasoning:
        effort: high
      generation:
        temperature: 0.2
        max_output_tokens: 6000
        max_steps: 90
        prompt_version: v1
      provider_options:
        openai:
          reasoningEffort: high
          reasoningSummary: concise
        anthropic:
          effort: high
    codex_cli:
      enabled: false
      adapter: cli-codex
      command: codex exec
      # Key inside GITVIBE_AI_ENV_JSON. Stores escaped auth.json text from jq -Rs .
      # Requires GITVIBE_GITHUB_TOKEN repository Secrets read/write permission for refresh write-back.
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.3-codex
      reasoning:
        effort: high
        summary: concise
    claude_code:
      enabled: false
      adapter: cli-claude-code
      command: claude -p
      # Key inside GITVIBE_AI_ENV_JSON. Stores the Claude Code OAuth access token.
      env:
        CLAUDE_CODE_OAUTH_TOKEN:
          from_bundle: CLAUDE_OAUTH_TOKEN
      model: opus
      reasoning:
        effort: xhigh
  budgets:
    default_timeout_minutes: 60
    implementation_timeout_minutes: 120
    feedback_timeout_minutes: 120
    publish_timeout_minutes: 15
    default_max_turns: 90
    implementation_max_turns: 120
    feedback_max_turns: 120
    review_max_iterations: 5
    validation_repair_attempts: 3
    validation_repair_max_turns: 45
    request_retry_attempts: 3
    request_retry_delay_seconds: 60
    max_context_window_tokens: 200000
    max_context_items: 200
    max_files_per_stage: 80
  stages:
    investigate:
      enabled: true
      profile: local_proxy
      fallback_profile: codex_cli
      tools:
        - read
        - grep
        - glob
        - diff
        - web-fetch
        - web-search
    summarize:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    validate:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    materialize:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
    implement:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff
    review-matrix:
      enabled: true
      profiles:
        - local_proxy
      tools:
        - read
        - grep
        - glob
        - diff
    create-pr:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - diff
    address-pr-feedback:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff

bug_investigation:
  auto_start_on_new_bug: false
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 6
    dispatch: investigation-only

feature_refinement:
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 10
    dispatch: summarize

analysis:
  author_weight_order:
    - admin
    - maintain
    - write
    - collaborator
    - member
    - contributor
    - first_time_contributor
    - guest
  include_reactions: true
  chronological: true
  preserve_thread_parents: true

review_matrix:
  - correctness
  - tests
  - security
  - maintainability

external_agents:
  codex:
    enabled: false
    review_command: "@codex review"
  claude:
    enabled: false
    review_command: "@claude review this plan or PR"
  copilot:
    enabled: false
