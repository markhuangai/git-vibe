name: Bug report
description: Report a reproducible problem in GitVibe.
title: "[Bug]: "
labels: []
body:
  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - Bug report
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide commands, links, workflow runs, or screenshots that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, runner type, Node/pnpm versions, and deployment mode when relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or links
      description: Paste relevant logs or link to workflow runs.
      render: text
    validations:
      required: false
