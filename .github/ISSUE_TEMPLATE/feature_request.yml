name: Feature request
description: Request product behavior that should become a discussion before implementation.
title: "[Feature]: "
labels: []
body:
  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - Feature request
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background story
      description: What problem or workflow motivates this feature?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Describe the user-visible behavior you want.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List concrete checks that would prove the feature is complete.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: Include compatibility, security, rollout, or explicit non-goal constraints.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs already discussed.
    validations:
      required: false
