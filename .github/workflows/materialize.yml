name: GitVibe materialize
run-name: "[git-vibe][materialize]: Discussion #${{ inputs.discussion-number }}"

on:
  workflow_dispatch:
    inputs:
      discussion-number:
        description: Discussion number to materialize.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for this job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      discussion-number:
        description: Discussion number to materialize.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for this job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
    secrets:
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for SDK adapter auth and provider variables.
        required: true
      GITVIBE_MCP_ENV_JSON:
        description: Optional JSON env bundle for MCP server credentials.
        required: false

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}

jobs:
  security-review:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    outputs:
      allowed: ${{ steps.security.outputs.allowed }}
      result-file: ${{ steps.security.outputs.result-file }}
      status: ${{ steps.security.outputs.status }}
      summary: ${{ steps.security.outputs.summary }}
    permissions:
      id-token: write
      contents: read
      discussions: write
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - id: security
        uses: ./.git-vibe/actions/security-review
        with:
          stage: materialize
          discussion-number: ${{ inputs.discussion-number }}
          stage-timeout-minutes: 10
          source-comment: ${{ inputs.source-comment }}

  materialize:
    runs-on: ${{ inputs.runner }}
    needs: security-review
    if: needs.security-review.outputs.allowed == 'true'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    permissions:
      id-token: write
      contents: read
      discussions: write
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - uses: ./.git-vibe/actions/materialize
        with:
          discussion-number: ${{ inputs.discussion-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          source-comment: ${{ inputs.source-comment }}
