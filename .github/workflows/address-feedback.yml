name: GitVibe address feedback
run-name: "[git-vibe][address-feedback]: PR #${{ inputs.pr-number }}"

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number whose unresolved feedback should be addressed.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the feedback remediation job.
        required: false
        type: number
        default: 120
      max_turns:
        description: Maximum AI turns for feedback remediation.
        required: false
        type: number
        default: 120
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository. Empty means this repository.
        required: false
        type: string
        default: ""
      action-ref:
        description: GitVibe action source ref. Empty means this workflow ref.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      pr-number:
        description: Pull request number whose unresolved feedback should be addressed.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the feedback remediation job.
        required: false
        type: number
        default: 120
      max_turns:
        description: Maximum AI turns for feedback remediation.
        required: false
        type: number
        default: 120
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository.
        required: false
        type: string
        default: markhuangai/git-vibe
      action-ref:
        description: GitVibe action source ref.
        required: false
        type: string
        default: v2
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for AI provider config and CLI profiles.
        required: true

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}

jobs:
  plan-investigate-feedback:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    env:
      GITVIBE_AI_ENV_JSON: ""
    outputs:
      indexes: ${{ steps.plan.outputs.indexes }}
      labels: ${{ steps.plan.outputs.labels }}
      max-parallel: ${{ steps.plan.outputs.max-parallel }}
      mode: ${{ steps.plan.outputs.mode }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: plan
        uses: ./.git-vibe/actions/plan-stage
        with:
          stage: investigate

  investigate-feedback-members:
    name: ${{ fromJSON(needs.plan-investigate-feedback.outputs.labels)[format('{0}', matrix.index)] }}
    runs-on: ${{ inputs.runner }}
    needs: plan-investigate-feedback
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan-investigate-feedback.outputs.max-parallel || '1') }}
      matrix:
        index: ${{ fromJSON(needs.plan-investigate-feedback.outputs.indexes || '[0]') }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/investigate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: member
          member-index: ${{ matrix.index }}
      - name: Upload feedback investigation member result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-investigate-member-${{ matrix.index }}
          path: ${{ runner.temp }}/git-vibe-investigate-result.json
          if-no-files-found: ignore

  investigate-feedback:
    runs-on: ${{ inputs.runner }}
    needs:
      - plan-investigate-feedback
      - investigate-feedback-members
    if: always() && needs.plan-investigate-feedback.result == 'success'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
    outputs:
      next-state: ${{ steps.investigate.outputs.next-state }}
      result-file: ${{ steps.investigate.outputs.result-file }}
      status: ${{ steps.investigate.outputs.status }}
      summary: ${{ steps.investigate.outputs.summary }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download feedback investigation member results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: git-vibe-investigate-member-*
          path: ${{ runner.temp }}/git-vibe-investigate-members
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: investigate
        uses: ./.git-vibe/actions/investigate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
          execution-mode: finalizer
      - name: Upload feedback investigation handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-pr-feedback-investigation-${{ inputs.pr-number }}
          path: ${{ runner.temp }}/git-vibe-investigate-result.json
          if-no-files-found: ignore

  address-feedback:
    runs-on: ${{ inputs.runner }}
    needs: investigate-feedback
    if: needs.investigate-feedback.outputs.next-state == 'fixes-required'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
    outputs:
      next-state: ${{ steps.address.outputs.next-state }}
      result-file: ${{ steps.address.outputs.result-file }}
      status: ${{ steps.address.outputs.status }}
      summary: ${{ steps.address.outputs.summary }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
      - name: Download feedback investigation handoff
        uses: actions/download-artifact@v4
        with:
          name: git-vibe-pr-feedback-investigation-${{ inputs.pr-number }}
          path: ${{ runner.temp }}/git-vibe-feedback-handoff
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: address
        uses: ./.git-vibe/actions/address-pr-feedback
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
          handoff-dir: ${{ runner.temp }}/git-vibe-feedback-handoff

  plan-review-matrix:
    runs-on: ${{ inputs.runner }}
    needs: address-feedback
    if: needs.address-feedback.outputs.next-state == 'feedback-addressed'
    timeout-minutes: 10
    env:
      GITVIBE_AI_ENV_JSON: ""
    outputs:
      indexes: ${{ steps.plan.outputs.indexes }}
      labels: ${{ steps.plan.outputs.labels }}
      max-parallel: ${{ steps.plan.outputs.max-parallel }}
      mode: ${{ steps.plan.outputs.mode }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: plan
        uses: ./.git-vibe/actions/plan-stage
        with:
          stage: review-matrix

  review-matrix-members:
    name: ${{ fromJSON(needs.plan-review-matrix.outputs.labels)[format('{0}', matrix.index)] }}
    runs-on: ${{ inputs.runner }}
    needs: plan-review-matrix
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan-review-matrix.outputs.max-parallel || '1') }}
      matrix:
        index: ${{ fromJSON(needs.plan-review-matrix.outputs.indexes || '[0]') }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/review-matrix
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: member
          member-index: ${{ matrix.index }}
      - name: Upload review member result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-review-matrix-member-${{ matrix.index }}
          path: ${{ runner.temp }}/git-vibe-review-matrix-result.json
          if-no-files-found: ignore

  review-matrix:
    runs-on: ${{ inputs.runner }}
    needs:
      - plan-review-matrix
      - review-matrix-members
    if: always() && needs.plan-review-matrix.result == 'success'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download review member results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: git-vibe-review-matrix-member-*
          path: ${{ runner.temp }}/git-vibe-review-matrix-members
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/review-matrix
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
          execution-mode: finalizer
