name: GitVibe address feedback

on:
  workflow_dispatch:
    inputs:
      pr-number:
        description: Pull request number whose unresolved feedback should be addressed.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: self-hosted
      timeout_minutes:
        description: Maximum minutes for the feedback remediation job.
        required: false
        type: number
        default: 120
      max_turns:
        description: Maximum AI turns for feedback remediation.
        required: false
        type: number
        default: 120
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository. Empty means this repository.
        required: false
        type: string
        default: ""
      action-ref:
        description: GitVibe action source ref. Empty means this workflow ref.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      pr-number:
        description: Pull request number whose unresolved feedback should be addressed.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: self-hosted
      timeout_minutes:
        description: Maximum minutes for the feedback remediation job.
        required: false
        type: number
        default: 120
      max_turns:
        description: Maximum AI turns for feedback remediation.
        required: false
        type: number
        default: 120
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository.
        required: false
        type: string
        default: git-vibe/actions
      action-ref:
        description: GitVibe action source ref.
        required: false
        type: string
        default: main
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_API_KEY:
        description: AI provider API key for GitVibe stage execution.
        required: true

env:
  GITVIBE_AI_API_KEY: ${{ secrets.GITVIBE_AI_API_KEY }}
  GITVIBE_AI_BASE_URL: ${{ vars.GITVIBE_AI_BASE_URL }}
  GITVIBE_AI_MODEL: ${{ vars.GITVIBE_AI_MODEL }}

jobs:
  address-feedback:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/address-pr-feedback
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ inputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
