name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: rootless-docker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm coverage
      - run: pnpm build
      - run: pnpm actionlint
      - run: pnpm audit --prod
