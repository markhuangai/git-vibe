name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify pnpm
        run: |
          if ! command -v pnpm >/dev/null 2>&1; then
            echo "::error::pnpm is required on the self-hosted runner."
            exit 127
          fi
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm coverage
      - run: pnpm build
      - run: pnpm actionlint
      - run: pnpm audit --prod
