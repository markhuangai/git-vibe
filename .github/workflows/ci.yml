name: CI

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  quality:
    runs-on: docker-runner
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.3
          run_install: false
      - run: pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm coverage
      - run: pnpm build
      - run: pnpm actionlint
      - run: pnpm audit --prod
