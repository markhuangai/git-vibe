name: GitVibe app deploy

on:
  push:
    branches:
      - dev
    paths:
      - Dockerfile
      - docker-compose.yml
      - package.json
      - pnpm-lock.yaml
      - src/app/**
      - src/shared/**
      - app/**
      - .github/workflows/app-deploy.yml
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GITVIBE_IMAGE: ghcr.io/markhuangai/git-vibe:${{ github.sha }}

jobs:
  build:
    runs-on: app
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GITVIBE_IMAGE }}
            ghcr.io/markhuangai/git-vibe:latest

  deploy:
    runs-on: app
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Deploy app with Docker Compose
        env:
          GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GITVIBE_DISCUSSION_CATEGORY: ${{ vars.GITVIBE_DISCUSSION_CATEGORY }}
          GITVIBE_GITHUB_TOKEN: ${{ secrets.GITVIBE_GITHUB_TOKEN }}
          GITVIBE_IMAGE: ${{ env.GITVIBE_IMAGE }}
        run: |
          compose_files=(-f docker-compose.yml)
          if [ -f /opt/git-vibe/docker-compose.override.yml ]; then
            compose_files+=(-f /opt/git-vibe/docker-compose.override.yml)
          fi

          docker compose "${compose_files[@]}" pull
          docker compose "${compose_files[@]}" up -d
          docker image prune -f
