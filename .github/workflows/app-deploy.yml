name: GitVibe app deploy

on:
  workflow_call:
    inputs:
      release_tag:
        description: Published prerelease tag to deploy.
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  GITVIBE_IMAGE: ghcr.io/markhuangai/git-vibe:${{ inputs.release_tag }}

jobs:
  deploy:
    runs-on: app
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate prerelease tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+){0,2}-[0-9A-Za-z._-]+$ ]]; then
            echo "::error::app-deploy only accepts prerelease tags such as v3.1.1-rc.1."
            exit 1
          fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Deploy app with Docker Compose
        env:
          GITHUB_APP_ID: ${{ vars.GITVIBE_GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GITVIBE_DISCUSSION_CATEGORY: ${{ vars.GITVIBE_DISCUSSION_CATEGORY }}
          GITVIBE_IMAGE: ${{ env.GITVIBE_IMAGE }}
        run: |
          compose_files=(-f docker-compose.yml)
          if [ -f /opt/git-vibe/docker-compose.override.yml ]; then
            compose_files+=(-f /opt/git-vibe/docker-compose.override.yml)
          fi

          docker compose "${compose_files[@]}" pull
          docker compose "${compose_files[@]}" up -d
          docker image prune -f
