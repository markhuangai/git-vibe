name: GitVibe develop
run-name: "[git-vibe][develop]: Issue #${{ inputs.issue-number }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to implement.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: docker-runner
      implementation_timeout_minutes:
        description: Maximum minutes for the implementation job.
        required: false
        type: number
        default: 120
      review_timeout_minutes:
        description: Maximum minutes for the review matrix job.
        required: false
        type: number
        default: 60
      create_pr_timeout_minutes:
        description: Maximum minutes for the PR creation job.
        required: false
        type: number
        default: 15
      max_turns:
        description: Default maximum AI turns for stages in this workflow.
        required: false
        type: number
        default: 90
      implementation_max_turns:
        description: Maximum AI turns for implementation and feedback-style coding work.
        required: false
        type: number
        default: 200
      validation_repair_attempts:
        description: Maximum validation repair attempts inside each implementation run.
        required: false
        type: number
        default: 3
      validation_repair_max_turns:
        description: Maximum AI turns for each validation repair attempt.
        required: false
        type: number
        default: 45
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      accept-risk:
        description: Continue this run after a trusted prompt-injection risk acceptance.
        required: false
        type: boolean
        default: false
      accept-risk-actor:
        description: GitHub login that accepted the prompt-injection risk.
        required: false
        type: string
        default: ""
      accept-risk-artifact-sha:
        description: Pull request head SHA covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
      accept-risk-stage:
        description: Comma-separated GitVibe stages covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to implement.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: docker-runner
      implementation_timeout_minutes:
        description: Maximum minutes for the implementation job.
        required: false
        type: number
        default: 120
      review_timeout_minutes:
        description: Maximum minutes for the review matrix job.
        required: false
        type: number
        default: 60
      create_pr_timeout_minutes:
        description: Maximum minutes for the PR creation job.
        required: false
        type: number
        default: 15
      max_turns:
        description: Default maximum AI turns for stages in this workflow.
        required: false
        type: number
        default: 90
      implementation_max_turns:
        description: Maximum AI turns for implementation and feedback-style coding work.
        required: false
        type: number
        default: 200
      validation_repair_attempts:
        description: Maximum validation repair attempts inside each implementation run.
        required: false
        type: number
        default: 3
      validation_repair_max_turns:
        description: Maximum AI turns for each validation repair attempt.
        required: false
        type: number
        default: 45
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      accept-risk:
        description: Continue this run after a trusted prompt-injection risk acceptance.
        required: false
        type: boolean
        default: false
      accept-risk-actor:
        description: GitHub login that accepted the prompt-injection risk.
        required: false
        type: string
        default: ""
      accept-risk-artifact-sha:
        description: Pull request head SHA covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
      accept-risk-stage:
        description: Comma-separated GitVibe stages covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for AI provider config and CLI profiles.
        required: true
      GITVIBE_MCP_ENV_JSON:
        description: Optional JSON env bundle for MCP server credentials.
        required: false

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}

jobs:
  security-review:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    outputs:
      allowed: ${{ steps.security.outputs.allowed }}
      result-file: ${{ steps.security.outputs.result-file }}
      status: ${{ steps.security.outputs.status }}
      summary: ${{ steps.security.outputs.summary }}
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: security
        uses: ./.git-vibe/actions/security-review
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          stage: implement
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: 10
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}

  implement:
    runs-on: ${{ inputs.runner }}
    needs: security-review
    if: needs.security-review.outputs.allowed == 'true'
    timeout-minutes: ${{ fromJSON(inputs.implementation_timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/implement
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.implementation_timeout_minutes) }}
          max-turns: ${{ inputs.implementation_max_turns }}
          validation-repair-attempts: ${{ inputs.validation_repair_attempts }}
          validation-repair-max-turns: ${{ inputs.validation_repair_max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}

  implementation-blocked-cleanup:
    runs-on: ${{ inputs.runner }}
    needs: implement
    if: always() && (needs.implement.result == 'failure' || needs.implement.result == 'cancelled')
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/mark-blocked
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          dry-run: ${{ inputs.dry-run }}

  create-pr:
    runs-on: ${{ inputs.runner }}
    needs: implement
    timeout-minutes: ${{ fromJSON(inputs.create_pr_timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    outputs:
      pr-number: ${{ steps.create.outputs.pr-number }}
      pr-url: ${{ steps.create.outputs.pr-url }}
      summary: ${{ steps.create.outputs.summary }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: create
        uses: ./.git-vibe/actions/create-pr
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.create_pr_timeout_minutes) }}
          max-turns: 20
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}

  plan-review-matrix:
    runs-on: ${{ inputs.runner }}
    needs: create-pr
    if: needs.create-pr.outputs.pr-number != ''
    timeout-minutes: 10
    env:
      GITVIBE_AI_ENV_JSON: ""
      GITVIBE_MCP_ENV_JSON: ""
    outputs:
      indexes: ${{ steps.plan.outputs.indexes }}
      labels: ${{ steps.plan.outputs.labels }}
      max-parallel: ${{ steps.plan.outputs.max-parallel }}
      mode: ${{ steps.plan.outputs.mode }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: plan
        uses: ./.git-vibe/actions/plan-stage
        with:
          stage: review-matrix

  review-matrix-members:
    name: ${{ fromJSON(needs.plan-review-matrix.outputs.labels)[format('{0}', matrix.index)] }}
    runs-on: ${{ inputs.runner }}
    needs:
      - create-pr
      - plan-review-matrix
    if: needs.create-pr.outputs.pr-number != '' && needs.plan-review-matrix.result == 'success'
    timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan-review-matrix.outputs.max-parallel || '1') }}
      matrix:
        index: ${{ fromJSON(needs.plan-review-matrix.outputs.indexes || '[0]') }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: review
        uses: ./.git-vibe/actions/review-matrix
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ needs.create-pr.outputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: member
          member-index: ${{ matrix.index }}
      - name: Upload review member result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-review-matrix-member-${{ matrix.index }}
          path: ${{ runner.temp }}/git-vibe-review-matrix-result.json
          if-no-files-found: ignore

  review-matrix:
    runs-on: ${{ inputs.runner }}
    needs:
      - create-pr
      - plan-review-matrix
      - review-matrix-members
    if: always() && needs.create-pr.outputs.pr-number != '' && needs.plan-review-matrix.result == 'success'
    timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    outputs:
      next-state: ${{ steps.review.outputs.next-state }}
      result-file: ${{ steps.review.outputs.result-file }}
      status: ${{ steps.review.outputs.status }}
      summary: ${{ steps.review.outputs.summary }}
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download review member results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: git-vibe-review-matrix-member-*
          path: ${{ runner.temp }}/git-vibe-review-matrix-members
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: review
        uses: ./.git-vibe/actions/review-matrix
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          pr-number: ${{ needs.create-pr.outputs.pr-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
          execution-mode: finalizer
