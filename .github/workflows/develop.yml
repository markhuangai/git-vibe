name: GitVibe develop
run-name: "[git-vibe][develop]: Issue #${{ inputs.issue-number }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to implement.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: rootless-docker
      implementation_timeout_minutes:
        description: Maximum minutes for the implementation job.
        required: false
        type: number
        default: 120
      review_timeout_minutes:
        description: Maximum minutes for the review matrix job.
        required: false
        type: number
        default: 60
      publish_timeout_minutes:
        description: Maximum minutes for the PR publish job.
        required: false
        type: number
        default: 15
      max_turns:
        description: Default maximum AI turns for stages in this workflow.
        required: false
        type: number
        default: 90
      implementation_max_turns:
        description: Maximum AI turns for implementation and feedback-style coding work.
        required: false
        type: number
        default: 120
      validation_repair_attempts:
        description: Maximum validation repair attempts inside each implementation run.
        required: false
        type: number
        default: 3
      validation_repair_max_turns:
        description: Maximum AI turns for each validation repair attempt.
        required: false
        type: number
        default: 45
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository. Empty means this repository.
        required: false
        type: string
        default: ""
      action-ref:
        description: GitVibe action source ref. Empty means this workflow ref.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to implement.
        required: true
        type: string
      runner:
        description: Runner label for all jobs.
        required: false
        type: string
        default: rootless-docker
      implementation_timeout_minutes:
        description: Maximum minutes for the implementation job.
        required: false
        type: number
        default: 120
      review_timeout_minutes:
        description: Maximum minutes for the review matrix job.
        required: false
        type: number
        default: 60
      publish_timeout_minutes:
        description: Maximum minutes for the PR publish job.
        required: false
        type: number
        default: 15
      max_turns:
        description: Default maximum AI turns for stages in this workflow.
        required: false
        type: number
        default: 90
      implementation_max_turns:
        description: Maximum AI turns for implementation and feedback-style coding work.
        required: false
        type: number
        default: 120
      validation_repair_attempts:
        description: Maximum validation repair attempts inside each implementation run.
        required: false
        type: number
        default: 3
      validation_repair_max_turns:
        description: Maximum AI turns for each validation repair attempt.
        required: false
        type: number
        default: 45
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository.
        required: false
        type: string
        default: git-vibe/actions
      action-ref:
        description: GitVibe action source ref.
        required: false
        type: string
        default: main
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for AI provider config and CLI profiles.
        required: true

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}
  GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}

jobs:
  implement:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.implementation_timeout_minutes) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/implement
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.implementation_timeout_minutes) }}
          max-turns: ${{ inputs.implementation_max_turns }}
          validation-repair-attempts: ${{ inputs.validation_repair_attempts }}
          validation-repair-max-turns: ${{ inputs.validation_repair_max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"

  review-matrix:
    runs-on: ${{ inputs.runner }}
    needs: implement
    timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
    outputs:
      next-state: ${{ steps.review.outputs.next-state }}
      result-file: ${{ steps.review.outputs.result-file }}
      status: ${{ steps.review.outputs.status }}
      summary: ${{ steps.review.outputs.summary }}
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: review
        uses: ./.git-vibe/actions/review-matrix
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          fail-on-blocked: "true"
      - name: Upload review handoff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-review-${{ inputs.issue-number }}
          path: ${{ runner.temp }}/git-vibe-review-matrix-result.json
          if-no-files-found: ignore

  review-changes-required:
    runs-on: ${{ inputs.runner }}
    needs: review-matrix
    if: needs.review-matrix.outputs.next-state == 'changes-required'
    timeout-minutes: ${{ fromJSON(inputs.review_timeout_minutes) }}
    permissions:
      contents: read
    steps:
      - name: Stop before PR creation
        shell: bash
        run: |
          echo "::error::Review matrix requested implementation changes. PR creation is skipped until a follow-up implementation run addresses the review handoff."
          exit 1

  create-pr:
    runs-on: ${{ inputs.runner }}
    needs: review-matrix
    if: needs.review-matrix.outputs.next-state == 'review-passed'
    timeout-minutes: ${{ fromJSON(inputs.publish_timeout_minutes) }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/create-pr
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.publish_timeout_minutes) }}
          max-turns: 20
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
