name: GitVibe release
run-name: "[git-vibe][release]: ${{ inputs.release_tag }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, such as v3 or v3.0.0.
        required: true
        default: v3
      source_image_tag:
        description: Existing GHCR image tag to promote. Defaults to the workflow commit SHA.
        required: false
        default: ""

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: rootless-docker
    env:
      BUILDX_CONFIG: /tmp/.docker-buildx
      DOCKER_CONTEXT: default
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release request
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REQUEST_ACTOR: ${{ github.actor }}
          SOURCE_IMAGE_TAG: ${{ inputs.source_image_tag }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Releases must be dispatched from the main branch."
            exit 1
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+){0,2}([-+][0-9A-Za-z._-]+)?$ ]]; then
            echo "::error::release_tag must look like v3, v3.0.0, or v3.0.0-rc.1."
            exit 1
          fi

          permission="$(gh api "repos/$GITHUB_REPOSITORY/collaborators/$REQUEST_ACTOR/permission" --jq '.permission')"
          if [ "$permission" != "admin" ]; then
            echo "::error::@$REQUEST_ACTOR has repository permission '$permission'; release dispatch requires admin."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists on origin."
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          source_tag="${SOURCE_IMAGE_TAG:-$GITHUB_SHA}"
          {
            echo "image=$image"
            echo "release_tag=$RELEASE_TAG"
            echo "source_image=$image:$source_tag"
            echo "release_image=$image:$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker builder
        shell: bash
        run: |
          set -euo pipefail

          if docker buildx inspect rootless --bootstrap >/dev/null 2>&1; then
            docker buildx use rootless
          else
            docker buildx rm rootless >/dev/null 2>&1 || true
            docker buildx create --name rootless --use default
            docker buildx inspect --bootstrap
          fi

      - name: Promote release image
        run: |
          docker pull "${{ steps.release.outputs.source_image }}"
          docker tag "${{ steps.release.outputs.source_image }}" "${{ steps.release.outputs.release_image }}"
          docker push "${{ steps.release.outputs.release_image }}"

      - name: Clean Docker release artifacts
        run: |
          docker image rm \
            "${{ steps.release.outputs.source_image }}" \
            "${{ steps.release.outputs.release_image }}" || true
          docker buildx prune --force --filter until=48h || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Docker image: \`${{ steps.release.outputs.release_image }}\`

          Source image: \`${{ steps.release.outputs.source_image }}\`
          Release commit: \`$GITHUB_SHA\`
          EOF

          gh release create "${{ steps.release.outputs.release_tag }}" \
            --target "$GITHUB_SHA" \
            --title "GitVibe ${{ steps.release.outputs.release_tag }}" \
            --notes-file release-notes.md \
            --generate-notes \
            --latest
