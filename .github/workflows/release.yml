name: GitVibe release
run-name: "[git-vibe][release]: ${{ inputs.release_tag }}"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create. Stable tags run from main; prerelease tags run from dev.
        required: true
        default: v3

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: rootless-docker
    outputs:
      app_changed: ${{ steps.app_changes.outputs.app_changed }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_tag: ${{ steps.release.outputs.release_tag }}
    env:
      BUILDX_CONFIG: /tmp/.docker-buildx
      DOCKER_CONTEXT: default
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release request
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          REQUEST_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+){0,2}-[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            prerelease=true
            required_ref=refs/heads/dev
          elif [[ "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+){0,2}$ ]]; then
            prerelease=false
            required_ref=refs/heads/main
          else
            echo "::error::release_tag must look like v3, v3.0.0, or v3.0.0-rc.1."
            exit 1
          fi

          if [ "$GITHUB_REF" != "$required_ref" ]; then
            echo "::error::Stable releases must run from main; prereleases must run from dev."
            exit 1
          fi

          permission="$(gh api "repos/$GITHUB_REPOSITORY/collaborators/$REQUEST_ACTOR/permission" --jq '.permission')"
          if [ "$permission" != "admin" ]; then
            echo "::error::@$REQUEST_ACTOR has repository permission '$permission'; release dispatch requires admin."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists on origin."
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_image="$image:$RELEASE_TAG"
          latest_image="$image:latest"
          {
            echo "image=$image"
            echo "prerelease=$prerelease"
            echo "release_tag=$RELEASE_TAG"
            echo "release_image=$release_image"
            echo "latest_image=$latest_image"
            echo "docker_tags<<EOF"
            echo "$release_image"
            if [ "$prerelease" = "false" ]; then
              echo "$latest_image"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect app-impacting changes
        id: app_changes
        shell: bash
        run: |
          set -euo pipefail

          base_ref=""
          while IFS= read -r tag; do
            if git merge-base --is-ancestor "$tag" HEAD; then
              base_ref="$tag"
              break
            fi
          done < <(git for-each-ref --sort=-creatordate --format='%(refname:short)' 'refs/tags/v*')

          if [ -n "$base_ref" ]; then
            changed_files="$(git diff --name-only "$base_ref..HEAD")"
          else
            changed_files="$(git ls-tree -r --name-only HEAD)"
          fi

          app_changed=false
          while IFS= read -r file; do
            case "$file" in
              Dockerfile|docker-compose.yml|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json|tsconfig.build.json|packages/*/package.json|src/app/*|src/shared/*|.github/workflows/app-deploy.yml|.github/workflows/release.yml)
                app_changed=true
                break
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "app_changed=$app_changed"
            echo "base_ref=$base_ref"
          } >> "$GITHUB_OUTPUT"

          if [ "$app_changed" = "true" ]; then
            echo "App image will be built; app-impacting changes exist since ${base_ref:-initial tree}."
          else
            echo "App image build skipped; no app-impacting changes since ${base_ref:-initial tree}."
          fi

      - name: Set up Docker builder
        if: steps.app_changes.outputs.app_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if docker buildx inspect rootless --bootstrap >/dev/null 2>&1; then
            docker buildx use rootless
          else
            docker buildx rm rootless >/dev/null 2>&1 || true
            docker buildx create --name rootless --use default
            docker buildx inspect --bootstrap
          fi

      - name: Build and push release image
        if: steps.app_changes.outputs.app_changed == 'true'
        env:
          DOCKER_TAGS: ${{ steps.release.outputs.docker_tags }}
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<< "$DOCKER_TAGS"

          docker buildx build --push "${tag_args[@]}" .

      - name: Clean Docker release artifacts
        if: steps.app_changes.outputs.app_changed == 'true'
        run: |
          docker buildx prune --force --filter until=48h || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_BASE_REF: ${{ steps.app_changes.outputs.base_ref }}
          APP_CHANGED: ${{ steps.app_changes.outputs.app_changed }}
          IS_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail

          {
            if [ "$APP_CHANGED" = "true" ]; then
              echo "Docker image: \`${{ steps.release.outputs.release_image }}\`"
              if [ "$IS_PRERELEASE" = "false" ]; then
                echo "Latest image: \`${{ steps.release.outputs.latest_image }}\`"
              fi
            else
              echo "Docker image: not built; no app-impacting changes since \`${APP_BASE_REF:-initial tree}\`."
            fi
            echo
            echo "Release commit: \`$GITHUB_SHA\`"
          } > release-notes.md

          release_flags=(
            --target "$GITHUB_SHA"
            --title "GitVibe ${{ steps.release.outputs.release_tag }}"
            --notes-file release-notes.md
            --generate-notes
          )

          if [ "$IS_PRERELEASE" = "true" ]; then
            release_flags+=(--prerelease --latest=false)
          else
            release_flags+=(--latest)
          fi

          gh release create "${{ steps.release.outputs.release_tag }}" \
            "${release_flags[@]}"

  deploy-prerelease:
    needs: release
    if: needs.release.outputs.prerelease == 'true' && needs.release.outputs.app_changed == 'true'
    uses: ./.github/workflows/app-deploy.yml
    with:
      release_tag: ${{ needs.release.outputs.release_tag }}
    secrets: inherit
