name: GitVibe validate
run-name: "[git-vibe][validate]: ${{ inputs.discussion-number != '' && format('Discussion #{0}', inputs.discussion-number) || inputs.issue-number != '' && format('Issue #{0}', inputs.issue-number) || 'Artifact' }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to validate.
        required: false
        type: string
        default: ""
      discussion-number:
        description: Discussion number to validate.
        required: false
        type: string
        default: ""
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: pipeline
      timeout_minutes:
        description: Maximum minutes for this job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository. Empty means this repository.
        required: false
        type: string
        default: ""
      action-ref:
        description: GitVibe action source ref. Empty means this workflow ref.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to validate.
        required: false
        type: string
        default: ""
      discussion-number:
        description: Discussion number to validate.
        required: false
        type: string
        default: ""
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: pipeline
      timeout_minutes:
        description: Maximum minutes for this job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      action-repository:
        description: GitVibe action source repository.
        required: false
        type: string
        default: git-vibe/actions
      action-ref:
        description: GitVibe action source ref.
        required: false
        type: string
        default: main
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for AI provider config and CLI profiles.
        required: true

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}
  GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}

jobs:
  validate:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    permissions:
      contents: read
      discussions: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/validate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          discussion-number: ${{ inputs.discussion-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
      - name: Upload validation result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-validation-${{ github.run_id }}
          path: ${{ runner.temp }}/git-vibe-validate-result.json
          if-no-files-found: ignore
