name: GitVibe investigate
run-name: "[git-vibe][investigate]: Issue #${{ inputs.issue-number }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      accept-risk:
        description: Continue this run after a trusted prompt-injection risk acceptance.
        required: false
        type: boolean
        default: false
      accept-risk-actor:
        description: GitHub login that accepted the prompt-injection risk.
        required: false
        type: string
        default: ""
      accept-risk-artifact-sha:
        description: Pull request head SHA covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
      accept-risk-stage:
        description: Comma-separated GitVibe stages covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
      accept-risk:
        description: Continue this run after a trusted prompt-injection risk acceptance.
        required: false
        type: boolean
        default: false
      accept-risk-actor:
        description: GitHub login that accepted the prompt-injection risk.
        required: false
        type: string
        default: ""
      accept-risk-artifact-sha:
        description: Pull request head SHA covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
      accept-risk-stage:
        description: Comma-separated GitVibe stages covered by the accepted-risk decision.
        required: false
        type: string
        default: ""
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for AI provider config and CLI profiles.
        required: true
      GITVIBE_MCP_ENV_JSON:
        description: Optional JSON env bundle for MCP server credentials.
        required: false

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}

jobs:
  security-review:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    outputs:
      allowed: ${{ steps.security.outputs.allowed }}
      result-file: ${{ steps.security.outputs.result-file }}
      status: ${{ steps.security.outputs.status }}
      summary: ${{ steps.security.outputs.summary }}
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: security
        uses: ./.git-vibe/actions/security-review
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          stage: investigate
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: 10
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}

  plan-investigate:
    runs-on: ${{ inputs.runner }}
    needs: security-review
    if: needs.security-review.outputs.allowed == 'true'
    timeout-minutes: 10
    env:
      GITVIBE_AI_ENV_JSON: ""
      GITVIBE_MCP_ENV_JSON: ""
    outputs:
      indexes: ${{ steps.plan.outputs.indexes }}
      labels: ${{ steps.plan.outputs.labels }}
      max-parallel: ${{ steps.plan.outputs.max-parallel }}
      mode: ${{ steps.plan.outputs.mode }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: plan
        uses: ./.git-vibe/actions/plan-stage
        with:
          stage: investigate

  investigate-members:
    name: ${{ fromJSON(needs.plan-investigate.outputs.labels)[format('{0}', matrix.index)] }}
    runs-on: ${{ inputs.runner }}
    needs: plan-investigate
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan-investigate.outputs.max-parallel || '1') }}
      matrix:
        index: ${{ fromJSON(needs.plan-investigate.outputs.indexes || '[0]') }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/investigate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: member
          member-index: ${{ matrix.index }}
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}
      - name: Upload investigation member result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git-vibe-investigate-member-${{ matrix.index }}
          path: ${{ runner.temp }}/git-vibe-investigate-result.json
          if-no-files-found: ignore

  investigate:
    runs-on: ${{ inputs.runner }}
    needs:
      - plan-investigate
      - investigate-members
    if: always() && needs.plan-investigate.result == 'success'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download investigation member results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: git-vibe-investigate-member-*
          path: ${{ runner.temp }}/git-vibe-investigate-members
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: ./.git-vibe/actions/investigate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: finalizer
          accept-risk: ${{ inputs.accept-risk }}
          accept-risk-actor: ${{ inputs.accept-risk-actor }}
          accept-risk-artifact-sha: ${{ inputs.accept-risk-artifact-sha }}
          accept-risk-stage: ${{ inputs.accept-risk-stage }}
