name: GitVibe investigate
run-name: "[git-vibe][investigate]: Issue #${{ inputs.issue-number }}"

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: docker-runner
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      source-comment:
        description: JSON source comment metadata for replying to command comments.
        required: false
        type: string
        default: ""
    secrets:
      GITVIBE_AI_ENV_JSON:
        description: JSON env bundle for SDK adapter auth and provider variables.
        required: true
      GITVIBE_MCP_ENV_JSON:
        description: Optional JSON env bundle for MCP server credentials.
        required: false

env:
  GITVIBE_BASE_BRANCH: ${{ vars.GITVIBE_BASE_BRANCH }}

jobs:
  security-review:
    runs-on: ${{ inputs.runner }}
    needs: plan-investigate
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    outputs:
      allowed: ${{ steps.security.outputs.allowed }}
      result-file: ${{ steps.security.outputs.result-file }}
      status: ${{ steps.security.outputs.status }}
      summary: ${{ steps.security.outputs.summary }}
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - id: security
        uses: ./.git-vibe/actions/security-review
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
          GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
        with:
          stage: investigate
          issue-number: ${{ inputs.issue-number }}
          adapter: ${{ needs.plan-investigate.outputs.safety-adapter }}
          stage-timeout-minutes: 10
          source-comment: ${{ inputs.source-comment }}

  plan-investigate:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    env:
      GITVIBE_AI_ENV_JSON: ""
      GITVIBE_MCP_ENV_JSON: ""
    outputs:
      adapters: ${{ steps.plan.outputs.adapters }}
      finalizer-adapter: ${{ steps.plan.outputs.finalizer-adapter }}
      indexes: ${{ steps.plan.outputs.indexes }}
      labels: ${{ steps.plan.outputs.labels }}
      max-parallel: ${{ steps.plan.outputs.max-parallel }}
      mode: ${{ steps.plan.outputs.mode }}
      safety-adapter: ${{ steps.plan.outputs.safety-adapter }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - id: plan
        uses: ./.git-vibe/actions/plan-stage
        with:
          stage: investigate

  investigate-members:
    name: git-vibe-investigate-member-${{ matrix.index }} / ${{ fromJSON(needs.plan-investigate.outputs.labels)[format('{0}', matrix.index)] }}
    runs-on: ${{ inputs.runner }}
    needs:
      - plan-investigate
      - security-review
    if: needs.security-review.outputs.allowed == 'true'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan-investigate.outputs.max-parallel || '1') }}
      matrix:
        index: ${{ fromJSON(needs.plan-investigate.outputs.indexes || '[0]') }}
    permissions:
      id-token: write
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Prepare Claude Code executable
        if: ${{ fromJSON(needs.plan-investigate.outputs.adapters)[format('{0}', matrix.index)] == 'claude-code-sdk' }}
        run: bash .git-vibe/actions/scripts/prepare-claude-code.sh
      - name: Prepare Codex executable
        if: ${{ fromJSON(needs.plan-investigate.outputs.adapters)[format('{0}', matrix.index)] == 'codex-sdk' }}
        run: bash .git-vibe/actions/scripts/prepare-codex.sh
      - uses: ./.git-vibe/actions/investigate
        with:
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: member
          member-index: ${{ matrix.index }}
      - name: Upload investigation member result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: git-vibe-investigate-member-${{ matrix.index }}
          path: ${{ runner.temp }}/git-vibe-investigate-result.json
          if-no-files-found: ignore

  investigate:
    runs-on: ${{ inputs.runner }}
    needs:
      - plan-investigate
      - security-review
      - investigate-members
    if: always() && needs.plan-investigate.result == 'success' && needs.security-review.outputs.allowed == 'true'
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    env:
      GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
      GITVIBE_MCP_ENV_JSON: ${{ secrets.GITVIBE_MCP_ENV_JSON }}
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Download investigation member results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: git-vibe-investigate-member-*
          path: ${{ runner.temp }}/git-vibe-investigate-members
      - name: Checkout GitVibe action source
        uses: actions/checkout@v7
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .git-vibe/actions
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Prepare Claude Code executable
        if: ${{ needs.plan-investigate.outputs.finalizer-adapter == 'claude-code-sdk' }}
        run: bash .git-vibe/actions/scripts/prepare-claude-code.sh
      - name: Prepare Codex executable
        if: ${{ needs.plan-investigate.outputs.finalizer-adapter == 'codex-sdk' }}
        run: bash .git-vibe/actions/scripts/prepare-codex.sh
      - uses: ./.git-vibe/actions/investigate
        with:
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          source-comment: ${{ inputs.source-comment }}
          execution-mode: finalizer
