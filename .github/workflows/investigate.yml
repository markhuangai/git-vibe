name: GitVibe investigate

on:
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: self-hosted
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      action-repository:
        description: GitVibe action source repository. Empty means this repository.
        required: false
        type: string
        default: ""
      action-ref:
        description: GitVibe action source ref. Empty means this workflow ref.
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      issue-number:
        description: Issue number to investigate.
        required: true
        type: string
      runner:
        description: Runner label for this job.
        required: false
        type: string
        default: self-hosted
      timeout_minutes:
        description: Maximum minutes for the investigation job.
        required: false
        type: number
        default: 60
      max_turns:
        description: Maximum AI turns for this stage.
        required: false
        type: number
        default: 90
      dry-run:
        description: Validate and describe actions without writing to GitHub.
        required: false
        type: boolean
        default: false
      action-repository:
        description: GitVibe action source repository.
        required: false
        type: string
        default: git-vibe/actions
      action-ref:
        description: GitVibe action source ref.
        required: false
        type: string
        default: main
    secrets:
      GITVIBE_GITHUB_TOKEN:
        description: Fine-grained PAT used for GitHub API access.
        required: true
      GITVIBE_AI_API_KEY:
        description: AI provider API key for GitVibe stage execution.
        required: true

env:
  GITVIBE_AI_API_KEY: ${{ secrets.GITVIBE_AI_API_KEY }}
  GITVIBE_AI_BASE_URL: ${{ vars.GITVIBE_AI_BASE_URL }}
  GITVIBE_AI_MODEL: ${{ vars.GITVIBE_AI_MODEL }}

jobs:
  investigate:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout GitVibe action source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.action-repository || github.repository }}
          ref: ${{ inputs.action-ref || github.ref_name }}
          path: .git-vibe/actions
      - uses: ./.git-vibe/actions/investigate
        with:
          token: ${{ secrets.GITVIBE_GITHUB_TOKEN || github.token }}
          issue-number: ${{ inputs.issue-number }}
          stage-timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
          max-turns: ${{ inputs.max_turns }}
          dry-run: ${{ inputs.dry-run }}
