name: AI smoke test

on:
  workflow_dispatch:
    inputs:
      run-local-proxy:
        description: Run AI SDK plus agentool against bundled provider config.
        required: false
        type: boolean
        default: true
      require-local-proxy-tool:
        description: Require the AI SDK smoke model to call an agentool read tool.
        required: false
        type: boolean
        default: true
      run-codex:
        description: Run Codex CLI smoke test with auth.json on the pipeline runner.
        required: false
        type: boolean
        default: false
      run-claude-code:
        description: Run Claude Code CLI smoke test on the pipeline runner.
        required: false
        type: boolean
        default: false

jobs:
  local-proxy:
    if: ${{ inputs.run-local-proxy }}
    runs-on: docker-runner
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm --version
      - run: pnpm install --frozen-lockfile
      - name: Run local proxy smoke test
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
          GITVIBE_AI_MODEL: ${{ vars.GITVIBE_AI_MODEL }}
          GITVIBE_AI_SMOKE_REQUIRE_TOOL: ${{ inputs.require-local-proxy-tool }}
        run: node scripts/smoke-test-ai.mjs

  codex:
    if: ${{ inputs.run-codex }}
    runs-on: docker-runner
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Codex CLI
        shell: bash
        run: |
          if command -v codex >/dev/null; then
            codex --version
            exit 0
          fi

          export npm_config_prefix="$RUNNER_TEMP/npm-global"
          mkdir -p "$npm_config_prefix"
          echo "$npm_config_prefix/bin" >> "$GITHUB_PATH"
          npm install -g @openai/codex
      - name: Configure Codex auth
        shell: bash
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
        run: |
          export CODEX_HOME="${CODEX_HOME:-$HOME/.codex}"
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"

          if [ ! -f "$CODEX_HOME/auth.json" ]; then
            if [ -z "$GITVIBE_AI_ENV_JSON" ]; then
              echo "Set GITVIBE_AI_ENV_JSON with CODEX_AUTH_JSON or pre-seed CODEX_HOME/auth.json before running Codex."
              exit 1
            fi

            CODEX_AUTH_JSON="$(
              node -e 'try { const bundle = JSON.parse(process.env.GITVIBE_AI_ENV_JSON || "{}"); const authJson = bundle.CODEX_AUTH_JSON; if (typeof authJson !== "string" || authJson.length === 0) throw new Error("GITVIBE_AI_ENV_JSON.CODEX_AUTH_JSON must be a non-empty string."); process.stdout.write(authJson); } catch (error) { console.error(error instanceof Error ? error.message : String(error)); process.exit(1); }'
            )"
            printf '%s' "$CODEX_AUTH_JSON" > "$CODEX_HOME/auth.json"
            chmod 600 "$CODEX_HOME/auth.json"
          fi

          echo "CODEX_HOME=$CODEX_HOME" >> "$GITHUB_ENV"
          echo "Using persistent CODEX_HOME for Codex smoke test."
      - name: Run Codex smoke test
        shell: bash
        run: |
          smoke_dir="$(mktemp -d)"
          schema_file="$smoke_dir/schema.json"
          output_file="$smoke_dir/output.json"
          cat > "$schema_file" <<'JSON'
          {
            "type": "object",
            "additionalProperties": false,
            "required": ["ok", "source"],
            "properties": {
              "ok": { "type": "boolean" },
              "source": { "enum": ["codex"] }
            }
          }
          JSON

          codex exec \
            --dangerously-bypass-approvals-and-sandbox \
            --output-schema "$schema_file" \
            --output-last-message "$output_file" \
            "Return exactly this JSON object: {\"ok\": true, \"source\": \"codex\"}. Do not modify files."

          node - "$output_file" codex <<'NODE'
          const { readFileSync } = require("node:fs");

          function extractJsonObject(text) {
            const trimmed = text.trim();
            if (trimmed.startsWith("{") && trimmed.endsWith("}")) return trimmed;

            const fenced = trimmed.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/);
            if (fenced) return fenced[1].trim();

            const start = trimmed.indexOf("{");
            const end = trimmed.lastIndexOf("}");
            if (start >= 0 && end > start) return trimmed.slice(start, end + 1);

            throw new Error(`response did not contain a JSON object: ${trimmed.slice(0, 200)}`);
          }

          function validateSmokeResponse(output, expectedSource) {
            if (!output || typeof output !== "object" || Array.isArray(output)) {
              throw new Error("response JSON must be an object.");
            }
            if (output.ok !== true || output.source !== expectedSource) {
              throw new Error(`unexpected smoke response: ${JSON.stringify(output)}`);
            }
          }

          const response = JSON.parse(extractJsonObject(readFileSync(process.argv[2], "utf8")));
          validateSmokeResponse(response, process.argv[3]);
          console.log(`[git-vibe] ${process.argv[3]} smoke response ok.`);
          NODE

  claude-code:
    if: ${{ inputs.run-claude-code }}
    runs-on: docker-runner
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Install Claude Code CLI
        shell: bash
        run: |
          if command -v claude >/dev/null; then
            claude --version
            exit 0
          fi

          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run Claude Code smoke test
        shell: bash
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          node scripts/smoke-test-claude-code.mjs
