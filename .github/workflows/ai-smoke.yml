name: AI smoke test

on:
  workflow_dispatch:
    inputs:
      run-codex:
        description: Run Codex SDK smoke test with auth.json on the pipeline runner.
        required: false
        type: boolean
        default: false
      run-claude-code:
        description: Run Claude Code SDK smoke test on the pipeline runner.
        required: false
        type: boolean
        default: false

jobs:
  codex:
    if: ${{ inputs.run-codex }}
    runs-on: docker-runner
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Run Codex SDK smoke test
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
        run: node scripts/smoke-test-codex.mjs

  claude-code:
    if: ${{ inputs.run-claude-code }}
    runs-on: docker-runner
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - name: Prepare Claude Code executable
        run: bash scripts/prepare-claude-code.sh
      - name: Run Claude Code SDK smoke test
        env:
          GITVIBE_AI_ENV_JSON: ${{ secrets.GITVIBE_AI_ENV_JSON }}
        run: node scripts/smoke-test-claude-code.mjs
