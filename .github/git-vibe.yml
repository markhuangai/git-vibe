version: 1

permissions:
  approver_roles:
    - write
    - maintain
    - admin

labels:
  story: git-vibe:story
  bug: git-vibe:bug
  needs_discussion: git-vibe:needs-discussion
  needs_investigation: git-vibe:needs-investigation
  investigating: git-vibe:investigating
  investigation_complete: git-vibe:investigation-complete
  needs_expected_behavior: git-vibe:needs-expected-behavior
  ready_for_approval: git-vibe:ready-for-approval
  approved: git-vibe:approved
  in_progress: git-vibe:in-progress
  blocked: git-vibe:blocked
  pr_opened: git-vibe:pr-opened
  validate: git-vibe:validate

commands:
  prefix: /git-vibe
  allow_external_agent_mentions: false

runner:
  default: pipeline

event_delivery:
  mode: webhook
  relay:
    provider: smee
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  mode: webhook-pat
  token_secret: GITVIBE_GITHUB_TOKEN

tests:
  commands:
    - pnpm install --frozen-lockfile
    - pnpm check

ai:
  profiles:
    local_proxy:
      enabled: true
      adapter: ai-sdk-agentool
      context_window_tokens: 200000
      provider:
        type: openai-compatible
        model: glm-5
        base_url_variable: GITVIBE_AI_BASE_URL
        api_key_secret: GITVIBE_AI_API_KEY
      reasoning:
        effort: high
      generation:
        temperature: 0.2
        max_output_tokens: 6000
        max_steps: 90
        prompt_version: v1
      provider_options:
        openai:
          reasoningEffort: high
          reasoningSummary: concise
        anthropic:
          effort: high
    codex_cli_high:
      enabled: true
      adapter: cli-codex
      command: codex exec
      auth_json_secret: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: high
        summary: concise
    codex_cli_xhigh:
      enabled: true
      adapter: cli-codex
      command: codex exec
      auth_json_secret: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: xhigh
        summary: concise
    claude_code:
      enabled: false
      adapter: cli-claude-code
      command: claude -p
      oauth_token_secret: CLAUDE_CODE_OAUTH_TOKEN
      model: opus
      reasoning:
        effort: xhigh
  safety:
    require_structured_output: true
    deny_write_tokens_for_read_only_stages: true
    stop_on_contradictory_maintainer_context: true
    post_raw_model_output: false
    github_writes: deterministic-code-only
  budgets:
    default_timeout_minutes: 60
    implementation_timeout_minutes: 120
    feedback_timeout_minutes: 120
    publish_timeout_minutes: 15
    default_max_turns: 90
    implementation_max_turns: 120
    feedback_max_turns: 120
    review_max_iterations: 5
    validation_repair_attempts: 3
    validation_repair_max_turns: 45
    request_retry_attempts: 3
    request_retry_delay_seconds: 60
    max_context_window_tokens: 200000
    max_context_items: 200
    max_files_per_stage: 80
  stages:
    investigate:
      enabled: true
      access: read-only
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    summarize:
      enabled: true
      access: read-only
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    validate:
      enabled: true
      access: read-only
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    materialize:
      enabled: true
      access: publish-write
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
    implement:
      enabled: true
      access: branch-write
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff
    review-matrix:
      enabled: true
      access: read-only
      profiles:
        - codex_cli_xhigh
      tools:
        - read
        - grep
        - glob
        - diff
    create-pr:
      enabled: true
      access: publish-write
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - diff
    address-pr-feedback:
      enabled: true
      access: branch-write
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff

bug_investigation:
  auto_start_on_new_bug: false
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 6
    eligible_labels:
      - git-vibe:bug
    dispatch: investigation-only

feature_refinement:
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 10
    dispatch: summarize
