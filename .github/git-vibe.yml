version: 1

event_delivery:
  mode: webhook
  relay:
    provider: smee
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  mode: webhook-pat
  token_secret: GITVIBE_GITHUB_TOKEN

tests:
  commands:
    - pnpm install --frozen-lockfile
    - pnpm check

ai:
  budgets:
    default_timeout_minutes: 60
    review_timeout_minutes: 60
    implementation_timeout_minutes: 120
    feedback_timeout_minutes: 120
    create_pr_timeout_minutes: 15
    default_max_turns: 90
    implementation_max_turns: 200
    feedback_max_turns: 120
    validation_repair_attempts: 3
    validation_repair_max_turns: 45
    pr_feedback_max_iterations: 3
    request_retry_attempts: 3
    request_retry_delay_seconds: 60
  profiles:
    local_proxy:
      adapter: ai-sdk-agentool
      context_window_tokens: 200000
      context:
        files:
          - AGENTS.md
      provider:
        type: openai-compatible
        model: kimi-k2.5
        base_url:
          from_bundle: GITVIBE_AI_BASE_URL
        api_key:
          from_bundle: GITVIBE_AI_API_KEY
      reasoning:
        effort: high
      provider_options:
        openai:
          reasoningEffort: high
          reasoningSummary: concise
        anthropic:
          effort: high
    codex_5.4_high:
      adapter: cli-codex
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.4
      reasoning:
        effort: high
        summary: concise
    codex_5.5_high:
      adapter: cli-codex
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: high
        summary: concise
    codex_5.5_xhigh:
      adapter: cli-codex
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: xhigh
        summary: concise
    claude_code:
      adapter: cli-claude-code
      env:
        ANTHROPIC_API_KEY:
          from_bundle: GITVIBE_AI_API_KEY
        ANTHROPIC_BASE_URL:
          from_bundle: ANTHROPIC_BASE_URL
        ANTHROPIC_DEFAULT_OPUS_MODEL: kimi-k2.5
        ANTHROPIC_DEFAULT_SONNET_MODEL: kimi-k2.5
        ANTHROPIC_DEFAULT_HAIKU_MODEL: kimi-k2.5
        ANTHROPIC_MODEL: opus
        CLAUDE_CODE_SUBAGENT_MODEL: opus
      model: opus
      reasoning:
        effort: max
  mcp:
    servers:
      dense_mem:
        transport: stdio
        command: npx
        args: ["-y", "dense-mem-mcp-proxy"]
        env:
          DENSE_MEM_MCP_URL:
            from_bundle: DENSE_MEM_MCP_URL
          DENSE_MEM_API_KEY:
            from_bundle: DENSE_MEM_API_KEY
  role_groups:
    swarm:
      synthesizer: codex_5.5_high
      parallel: 3
      roles:
        - role: correctness.md
          profile: local_proxy
        - role: security.md
          profile: local_proxy
        - role: maintainability.md
          profile: local_proxy
  stages:
    investigate:
      role_group: swarm
      mcp:
        dense_mem:
          required: false
          tools: ["search_memory"]
    validate:
      role_group: swarm
      mcp:
        dense_mem:
          required: false
          tools: ["search_memory"]
    materialize:
      profile: codex_5.5_high
    implement:
      enabled: false
      profile: codex_5.4_high
    review-matrix:
      role_group: swarm
      mcp:
        dense_mem:
          required: false
          tools: ["search_memory"]
    create-pr:
      enabled: false
      profile: codex_5.5_high
    address-pr-feedback:
      enabled: false
      profile: codex_5.4_high
