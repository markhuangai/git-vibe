version: 1

event_delivery:
  mode: webhook
  relay:
    provider: smee
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  mode: github-app

safety:
  prompt_injection_gate: true

tests:
  commands:
    - pnpm install --frozen-lockfile
    - pnpm check

ai:
  budgets:
    default_timeout_minutes: 60
    review_timeout_minutes: 60
    default_max_turns: 200
  profiles:
    codex_5.6_max:
      adapter: codex-sdk
      api_key:
        from_bundle: GITVIBE_AI_API_KEY
      base_url:
        from_bundle: GITVIBE_AI_BASE_URL
      model: gpt-5.6
      reasoning:
        effort: xhigh
        summary: concise
    claude_code:
      adapter: claude-code-sdk
      context:
        files:
          - AGENTS.md
      env:
        ANTHROPIC_API_KEY:
          from_bundle: GITVIBE_AI_API_KEY
        ANTHROPIC_BASE_URL:
          from_bundle: ANTHROPIC_BASE_URL
        ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M2.5
        ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M2.5
        ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M2.5
        ANTHROPIC_MODEL: opus
        CLAUDE_CODE_SUBAGENT_MODEL: opus
      model: opus
      reasoning:
        effort: max
  mcp:
    servers:
      dense_mem:
        transport: stdio
        command: npx
        args: ["-y", "dense-mem-mcp-proxy"]
        env:
          DENSE_MEM_MCP_URL:
            from_bundle: DENSE_MEM_MCP_URL
          DENSE_MEM_API_KEY:
            from_bundle: DENSE_MEM_API_KEY
  role_groups:
    swarm:
      synthesizer: claude_code
      parallel: 3
      roles:
        - role: correctness.md
          profile: claude_code
        - role: security.md
          profile: claude_code
        - role: maintainability.md
          profile: claude_code
  stages:
    investigate:
      role_group: swarm
      mcp:
        dense_mem:
          required: true
          tools:
            - recall_memory
            - assemble_context
            - get_memory
            - get_fact
            - keyword_search
            - semantic_search
            - list_communities
            - get_community_summary
    validate:
      role_group: swarm
      mcp:
        dense_mem:
          required: true
          tools:
            - recall_memory
            - assemble_context
            - get_memory
            - get_fact
            - keyword_search
            - semantic_search
            - list_communities
            - get_community_summary
    materialize:
      profile: claude_code
      mcp:
        dense_mem:
          required: true
          tools:
            - recall_memory
            - assemble_context
            - get_memory
            - get_fact
            - keyword_search
            - semantic_search
            - list_communities
            - get_community_summary
    review-matrix:
      role_group: swarm
      mcp:
        dense_mem:
          required: true
          tools:
            - recall_memory
            - assemble_context
            - get_memory
            - get_fact
            - keyword_search
            - semantic_search
            - list_communities
            - get_community_summary
