version: 1

permissions:
  approver_roles:
    - write
    - maintain
    - admin

labels:
  story: gvi:story
  needs_discussion: gvi:needs-discussion
  investigate: git-vibe:investigate
  investigating: gvi:investigating
  investigated: gvi:investigated
  ready_for_approval: gvi:ready-for-approval
  approved: git-vibe:approved
  in_progress: gvi:in-progress
  blocked: gvi:blocked
  pr_opened: gvi:pr-opened
  pr_approved: gvi:pr-approved
  pr_merged: gvi:pr-merged
  validate: git-vibe:validate

commands:
  prefix: /git-vibe
  allow_external_agent_mentions: false

event_delivery:
  mode: webhook
  relay:
    provider: smee
    url_secret: GITVIBE_RELAY_URL
  actions_receiver:
    enabled: false
    scheduled_scan: "*/15 * * * *"
  polling:
    enabled: false
    interval_seconds: 300

github_auth:
  mode: webhook-pat
  token_secret: GITVIBE_GITHUB_TOKEN

tests:
  commands:
    - pnpm install --frozen-lockfile
    - pnpm check

ai:
  profiles:
    local_proxy:
      enabled: true
      adapter: ai-sdk-agentool
      context_window_tokens: 200000
      provider:
        type: openai-compatible
        model: glm-5
        base_url:
          from_bundle: GITVIBE_AI_BASE_URL
        api_key:
          from_bundle: GITVIBE_AI_API_KEY
      reasoning:
        effort: high
      generation:
        temperature: 0.2
        max_output_tokens: 6000
        max_steps: 90
        prompt_version: v1
      provider_options:
        openai:
          reasoningEffort: high
          reasoningSummary: concise
        anthropic:
          effort: high
    codex_cli_high:
      enabled: true
      adapter: cli-codex
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: high
        summary: concise
    codex_cli_xhigh:
      enabled: true
      adapter: cli-codex
      auth_json:
        from_bundle: CODEX_AUTH_JSON
      model: gpt-5.5
      reasoning:
        effort: xhigh
        summary: concise
    claude_code:
      enabled: false
      adapter: cli-claude-code
      env:
        CLAUDE_CODE_OAUTH_TOKEN:
          from_bundle: CLAUDE_OAUTH_TOKEN
      model: opus
      reasoning:
        effort: xhigh
  budgets:
    default_timeout_minutes: 60
    implementation_timeout_minutes: 120
    feedback_timeout_minutes: 120
    publish_timeout_minutes: 15
    default_max_turns: 90
    implementation_max_turns: 200
    feedback_max_turns: 120
    review_max_iterations: 5
    validation_repair_attempts: 3
    validation_repair_max_turns: 45
    request_retry_attempts: 3
    request_retry_delay_seconds: 60
    max_context_window_tokens: 200000
    max_context_items: 200
    max_files_per_stage: 80
  stages:
    investigate:
      enabled: true
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - diff
        - web-fetch
        - web-search
    summarize:
      enabled: true
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    validate:
      enabled: true
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - web-fetch
        - web-search
    materialize:
      enabled: true
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
    implement:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff
    review-matrix:
      enabled: true
      profiles:
        - codex_cli_xhigh
      tools:
        - read
        - grep
        - glob
        - diff
    create-pr:
      enabled: true
      profile: codex_cli_high
      tools:
        - read
        - grep
        - glob
        - diff
    address-pr-feedback:
      enabled: true
      profile: local_proxy
      tools:
        - read
        - grep
        - glob
        - edit
        - write
        - multi-edit
        - bash
        - diff

bug_investigation:
  auto_start_on_new_bug: false
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 6
    dispatch: investigation-only

feature_refinement:
  community_trigger:
    enabled: false
    reaction: "+1"
    threshold: 10
    dispatch: summarize
