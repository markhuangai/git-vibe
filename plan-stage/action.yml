name: GitVibe plan stage
description: Plan GitVibe stage matrix execution from repository config.

inputs:
  stage:
    description: GitVibe stage to plan.
    required: true

outputs:
  matrix:
    description: JSON matrix for stage member jobs.
    value: ${{ steps.plan.outputs.matrix }}
  indexes:
    description: JSON list of stage member indexes for workflow matrix fanout.
    value: ${{ steps.plan.outputs.indexes }}
  labels:
    description: JSON object mapping stage member indexes to display labels.
    value: ${{ steps.plan.outputs.labels }}
  adapters:
    description: JSON object mapping stage member indexes to GitVibe adapter names.
    value: ${{ steps.plan.outputs.adapters }}
  finalizer-adapter:
    description: GitVibe adapter name used by the finalizer job.
    value: ${{ steps.plan.outputs.finalizer-adapter }}
  max-parallel:
    description: Maximum parallel member jobs.
    value: ${{ steps.plan.outputs.max-parallel }}
  mode:
    description: Stage execution mode.
    value: ${{ steps.plan.outputs.mode }}

runs:
  using: composite
  steps:
    - name: Verify GitVibe action runtime
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: |
        cd "$GITHUB_ACTION_PATH/.."
        for file in dist/actions/plan-stage.js dist/actions/plan-stage.mjs; do
          if [ ! -f "$file" ]; then
            echo "::error::Missing prebuilt GitVibe action runtime: $file. Run corepack pnpm build and commit dist/actions."
            exit 1
          fi
        done
    - id: plan
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ""
        ACTIONS_ID_TOKEN_REQUEST_URL: ""
      run: node "$GITHUB_ACTION_PATH/../dist/actions/plan-stage.js" "${{ inputs.stage }}"
